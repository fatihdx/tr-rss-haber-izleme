# ════════════════════════════════════════════════════════════════
# ÇALIŞMA AYARLARI
# ════════════════════════════════════════════════════════════════

# Kontrol sıklığı (dakika)
interval_minutes: 15

# Aktif saat aralığı (Türkiye saati)
active_hours: "07:00-23:59"

# Zaman dilimi
tz: "Europe/Istanbul"

# Döngü başına maksimum haber sayısı
max_per_cycle: 15

# Link önizlemesini devre dışı bırak
disable_link_preview: true

# Haber başlığı 
title_prefix: "📋"

# Alt bilgi metni 
footer_text: "— TR-RSS Haber İzleme"

# ════════════════════════════════════════════════════════════════
# MESAJ FORMATI 
# ════════════════════════════════════════════════════════════════

message_format:
  # Format kullanılsın mı? (true = yeni format, false = eski format)
  enabled: true
  
  # Başlık satırı
  header:
    emoji_left: "‼️ 📋"
    text: "HABER LİSTESİ"
    emoji_right: "📋 ‼️"
  
  # Ayırıcı çizgi
  separator: "───────────────────────────────────"
  
  # Haber içeriği
  bullet: "•"
  
  # Link satırı
  link_emoji: "🔗"
  
  # Alt bilgi
  footer: "— TR-RSS Haber İzleme"

# ════════════════════════════════════════════════════════════════
# KAYIT VE LOGlama
# ════════════════════════════════════════════════════════════════

# Veritabanı dosyası
database_path: "state.db"

# Log dosyası
log_path: "logs/bot.log"

# Maksimum log dosyası boyutu (MB)
max_log_size_mb: 10

# Log yedek sayısı
log_backups: 5

# ════════════════════════════════════════════════════════════════
# v4 GÜVENİLİRLİK AYARLARI
# ════════════════════════════════════════════════════════════════

# Telegram gönderim tekrar deneme sayısı
retry_count: 3

# Tekrar denemeler arası bekleme (saniye, deneme numarasıyla çarpılır)
retry_delay: 2

# Görülen haberleri N günden sonra sil
cleanup_days: 30

# Her N cycle'da bir sağlık logu yaz
health_log_interval: 6

# RSS feed çekme zaman aşımı (saniye)
feed_timeout: 30
